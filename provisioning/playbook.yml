# ─────────────────────────────────────────────
#  User environment
# ─────────────────────────────────────────────
- name: VM1 Initialization
  hosts:
    - vm1
  become: true

  tasks:

  # ─── Disable unattended-upgrades─────────────────────────────

    - name: Disable unattended-upgrades during provisioning
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
      failed_when: false

    - name: Kill leftover apt/dpkg processes
      ansible.builtin.shell: |
        pkill -9 apt || true
        pkill -9 dpkg || true
      changed_when: false
      failed_when: false

    - name: Wait for apt lock to be released
      ansible.builtin.shell: >
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock \
        /var/cache/apt/archives/lock /var/lib/dpkg/lock >/dev/null 2>&1; do
          sleep 3
        done
      changed_when: false
      failed_when: false



    - name: Install tools
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - pipx
          - nodejs
          - npm
          - git
          - wget
          - curl
          - jq
          - unzip
          - zip
          - build-essential
          - firefox
          - chromium
          - libimage-exiftool-perl
          - ffmpeg
          - imagemagick
        state: present
        update_cache: 'yes'


    - name: Create Polkit rule to disable colord password prompts
      ansible.builtin.copy:
        content: |
          polkit.addRule(function(action, subject) {
              if ((action.id == "org.freedesktop.color-manager.create-device" ||
                   action.id == "org.freedesktop.color-manager.create-profile" ||
                   action.id == "org.freedesktop.color-manager.delete-device" ||
                   action.id == "org.freedesktop.color-manager.delete-profile" ||
                   action.id == "org.freedesktop.color-manager.modify-device" ||
                   action.id == "org.freedesktop.color-manager.modify-profile") &&
                  subject.isInGroup("user")) {
                  return polkit.Result.YES;
              }
          });
        dest: "/etc/polkit-1/rules.d/45-allow-colord.rules"
        mode: '0644'


# 2. Apply high-DPI scaling (written directly to xfconf config file,
    #    picked up automatically next time the XFCE session starts —
    #    no live D-Bus session required during provisioning)
    - name: Ensure xfconf config directory exists
      ansible.builtin.file:
        path: /home/user/.config/xfce4/xfconf/xfce-perchannel-xml
        state: directory
        owner: user
        group: user
        mode: '0755'
        recurse: true

    - name: Set XFCE DPI to 170
      ansible.builtin.copy:
        dest: /home/user/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml
        owner: user
        group: user
        mode: '0644'
        content: |
          <?xml version="1.0" encoding="UTF-8"?>

          <channel name="xsettings" version="1.0">
            <property name="Xft" type="empty">
              <property name="DPI" type="int" value="170"/>
            </property>
          </channel>


    # ── Module 5 (Image & Media OSINT) local files ──
    # Not web-served: the images are placed in the analyst's home directory so
    # students navigate to ~/Module_5 and examine the files locally (exiftool etc.).
    # Runs after the user-access role, so /home/user already exists.
    - name: Deploy Module 5 image files to the analyst home directory
      ansible.builtin.copy:
        src: files/module5/
        dest: /home/user/Module_5/
        owner: user
        group: user
        mode: '0644'
        directory_mode: '0755'

  roles:
    - role: user-access
      user_access_username: user
      user_access_password: Password123
      user_access_sudo: true

# ─────────────────────────────────────────────
#  Server machine
# ─────────────────────────────────────────────
- name: VM2 Initialization
  hosts:
    - vm2
  become: true

  tasks:

  # ─── Disable unattended-upgrades─────────────────────────────

    - name: Disable unattended-upgrades during provisioning
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: stopped
      failed_when: false

    - name: Kill leftover apt/dpkg processes
      ansible.builtin.shell: |
        pkill -9 apt || true
        pkill -9 dpkg || true
      changed_when: false
      failed_when: false

    - name: Wait for apt lock to be released
      ansible.builtin.shell: >
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock \
        /var/cache/apt/archives/lock /var/lib/dpkg/lock >/dev/null 2>&1; do
          sleep 3
        done
      changed_when: false
      failed_when: false

  
    - name: Install tools
      ansible.builtin.apt:
        name:
          - python3
          - python3-pip
          - pipx
          - nodejs
          - npm
          - git
          - wget
          - curl
          - jq
          - unzip
          - zip
          - rsync
          - build-essential
          - apache2
          - php
          - libapache2-mod-php
          - php-fpm
          - php-cli
          - openssh-server
          - cron
          - sqlite3
          - openssl
          - net-tools
          - dnsutils
        state: present
        update_cache: 'yes'

    # ── OSINT lab websites (Modules 4 & 8) ──
    # Sites are reachable only by path:
    #   Module 4: /chirp/, /agora/, /aif2024/
    #   Module 8 capstone: /case/  (dossier entry = /case/index.html)
    # The web root has no index page and directory listing is disabled,
    # so hitting the bare IP returns 403 and does not reveal the sites.
    # /case/ has its own index.html, so it serves normally under that path.
    - name: Remove default Apache landing page
      ansible.builtin.file:
        path: /var/www/html/index.html
        state: absent

    - name: Deploy OSINT lab websites to Apache document root
      ansible.builtin.copy:
        src: files/website/
        dest: /var/www/html/
        owner: www-data
        group: www-data
        mode: '0644'
        directory_mode: '0755'

    - name: Disable directory listing on the web root
      ansible.builtin.copy:
        dest: /etc/apache2/conf-available/no-indexes.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          <Directory /var/www/html>
              Options -Indexes
          </Directory>

    - name: Enable the no-indexes Apache config
      ansible.builtin.command: a2enconf no-indexes
      args:
        creates: /etc/apache2/conf-enabled/no-indexes.conf

    - name: Ensure Apache is enabled and running
      ansible.builtin.service:
        name: apache2
        state: started
        enabled: true

    - name: Reload Apache to apply configuration
      ansible.builtin.service:
        name: apache2
        state: reloaded

  roles:
    - role: user-access
      user_access_username: user
      user_access_password: Password123
      user_access_sudo: true

- name: Disable unattended apt upgrades
  hosts: vm1,vm2,man,router
  become: true
  tasks:
    - name: Disable unattended upgrades in apt periodic config
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "0";
          APT::Periodic::Unattended-Upgrade "0";

    - name: Disable apt daily timers
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
        masked: true
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
